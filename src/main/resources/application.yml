spring:
  application:
    name: ai-code-geng-backend
  profiles:
    active: local
  # session 配置
  session:
    # session 3 天过期
    timeout: 259200
    store-type: redis
server:
  port: 8123
  servlet:
    context-path: /api
    # cookie 3 天过期
    session:
      cookie:
        max-age: 259200

# springdoc-openapi
springdoc:
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.suny.aicodegeng.controller
# knife4j
knife4j:
  enable: true
  setting:
    language: zh_cn


